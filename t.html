<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gyan Quiz Pro - By Umesh Sharma</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --primary: #6366f1; --secondary: #a855f7;
            --gold: #fbbf24; --silver: #94a3b8; --bronze: #d97706;
            --bg: #f8fafc; --text: #1e293b; --white: #ffffff; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-content { text-align: center; color: white; animation: zoomIn 0.8s ease; }
        .logo-circle { width: 90px; height: 90px; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; margin: 0 auto 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); animation: pulse 2s infinite; }
        .loader { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; margin: 20px auto 0; animation: spin 1s linear infinite; }
        .hidden-splash { opacity: 0; visibility: hidden; }

        /* --- HEADER --- */
        .app-header { 
            background: linear-gradient(-45deg, #6366f1, #a855f7, #4f46e5, #9333ea);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            padding: 25px 15px; text-align: center; color: white; font-weight: 800; font-size: 1.5rem;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; 
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3); position: relative; overflow: hidden; z-index: 10;
        }
        .app-header::after { content: ''; position: absolute; top: -50%; left: -110%; width: 50%; height: 200%; background: rgba(255, 255, 255, 0.2); transform: rotate(30deg); animation: shineEffect 4s infinite; }

        /* --- CONTENT & CARDS --- */
        .main-content { flex: 1; overflow-y: auto; padding: 15px 15px 110px 15px; }
        .card { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .opt-btn { width: 100%; padding: 16px; margin: 8px 0; border: 2px solid #f1f5f9; border-radius: 15px; background: white; font-size: 1rem; text-align: left; font-weight: 600; outline: none; transition: 0.2s; }
        .correct { background: #22c55e !important; color: white; border-color: #16a34a; }
        .wrong { background: #ef4444 !important; color: white; border-color: #dc2626; }

        /* --- RANKING UI --- */
        .rank-card { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-radius: 15px; margin-bottom: 8px; background: #fff; border: 1px solid #f1f5f9; }
        .rank-1 { background: #fffbeb; border-color: var(--gold); }
        .my-rank-footer { position: fixed; bottom: 75px; left: 15px; right: 15px; background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; padding: 15px 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 25px rgba(99, 102, 241, 0.4); z-index: 999; }

        /* --- NAVIGATION --- */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; padding: 10px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { flex: 1; border: none; background: none; color: #94a3b8; display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        /* Keyframes */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes shineEffect { 0% { left: -110%; } 20% { left: 120%; } 100% { left: 120%; } }

        #quiz-screen, #leaderboard-screen, #result-screen { display: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div class="logo-circle">🎓</div>
            <h1 style="margin:0; font-size:2rem;">Gyan Quiz Pro</h1>
            <p style="opacity:0.8;">By Umesh Sharma</p>
            <div class="loader"></div>
        </div>
    </div>

    <div class="app-header">
        <span id="header-text">Gyan Quiz 🚀</span>
    </div>

    <div class="main-content">
        <div id="home-screen">
            <div class="card">
                <div id="user-input-section">
                    <h3 style="text-align:center">अपना नाम दर्ज करें 👋</h3>
                    <input type="text" id="user-name" style="width:100%; padding:15px; border-radius:15px; border:1px solid #ddd; outline:none;" placeholder="नाम यहाँ लिखें...">
                </div>
                <div id="welcome-msg" style="display:none; text-align:center; font-size:1.2rem; font-weight:bold; color:var(--primary); margin-bottom:20px;"></div>
                
                <p style="text-align:center; color:gray;">विषय चुनें:</p>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div onclick="startQuiz('Science')" class="card" style="text-align:center; margin:0; padding:15px; cursor:pointer;">🧪<br>Science</div>
                    <div onclick="startQuiz('History')" class="card" style="text-align:center; margin:0; padding:15px; cursor:pointer;">📜<br>History</div>
                    <div onclick="startQuiz('Polity')" class="card" style="text-align:center; margin:0; padding:15px; cursor:pointer;">⚖️<br>Polity</div>
                    <div onclick="startQuiz('GK')" class="card" style="text-align:center; margin:0; padding:15px; cursor:pointer;">💡<br>GK</div>
                </div>
            </div>
        </div>

        <div id="quiz-screen">
            <div class="card">
                <div style="width:100%; height:6px; background:#eee; border-radius:10px; margin-bottom:15px; overflow:hidden;">
                    <div id="t-bar" style="height:100%; background:var(--primary); width:100%; transition:1s linear;"></div>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-weight:bold; color:gray;">
                    <span id="q-count">1/5</span><span id="score-val">⭐ 0.00</span>
                </div>
                <h2 id="q-text" style="font-size:1.1rem; margin-bottom:15px;">लोड हो रहा है...</h2>
                <div id="options"></div>
            </div>
        </div>

        <div id="leaderboard-screen">
            <div id="lb-body"></div>
        </div>

        <div id="result-screen">
            <div class="card" style="text-align:center;">
                <h2>शानदार खेल! 🎊</h2>
                <h1 id="f-score" style="font-size:3.5rem; color:var(--primary); margin:10px 0;">0.00</h1>
                <button onclick="shareScore()" style="width:100%; padding:15px; border-radius:15px; background:#25d366; color:white; border:none; font-weight:bold; cursor:pointer;">📲 चैलेंज भेजें</button>
                <button onclick="switchTab('test')" class="opt-btn" style="background:var(--primary); color:white; text-align:center; margin-top:10px;">Home</button>
            </div>
        </div>
    </div>

    <div id="my-rank-box" class="my-rank-footer" style="display:none;">
        <div style="display:flex; align-items:center; gap:10px;">
            <div id="my-rank-num" style="background:white; color:var(--primary); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">?</div>
            <div id="my-rank-name" style="font-weight:bold;">-</div>
        </div>
        <div id="my-rank-score" style="font-weight:bold;">⭐ 0.00</div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" id="tab-test" onclick="switchTab('test')">🎮<span>Play</span></button>
        <button class="nav-item" id="tab-rank" onclick="switchTab('rank')">🏆<span>Ranking</span></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCh0tqMiTXliCGVj6kav7k1AjGKoekNqfI",
            authDomain: "myquizapp-159dc.firebaseapp.com",
            projectId: "myquizapp-159dc",
            databaseURL: "https://myquizapp-159dc-default-rtdb.firebaseio.com/",
            appId: "1:731901127533:web:84dd28b7dc36cb24f84864"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allQs = [], currentQs = [], qIdx = 0, score = 0, timer, timeLeft = 10;

        // Splash Hide
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => { document.getElementById('splash-screen').classList.add('hidden-splash'); }, 3000);
            const savedName = localStorage.getItem('quiz_user_name');
            if(savedName) showUser(savedName);
        });

        // Load Questions
        onValue(ref(db, 'questions'), (snap) => {
            if(snap.exists()) { allQs = Object.values(snap.val()); }
        });

        function showUser(name) {
            document.getElementById('user-input-section').style.display = 'none';
            document.getElementById('welcome-msg').innerText = "नमस्ते, " + name + "! 😊";
            document.getElementById('welcome-msg').style.display = 'block';
        }

        window.startQuiz = (cat) => {
            let name = localStorage.getItem('quiz_user_name') || document.getElementById('user-name').value.trim();
            if(!name) return alert("नाम लिखें!");
            if(!localStorage.getItem('quiz_user_name')) { localStorage.setItem('quiz_user_name', name); showUser(name); }

            currentQs = allQs.filter(q => q.cat.toLowerCase() === cat.toLowerCase()).sort(() => 0.5 - Math.random());
            if(currentQs.length === 0) return alert("सवाल नहीं मिले!");

            score = 0; qIdx = 0;
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            loadQ();
        };

        function loadQ() {
            if(qIdx >= currentQs.length) return endQuiz();
            const q = currentQs[qIdx];
            document.getElementById('q-count').innerText = `${qIdx+1}/${currentQs.length}`;
            document.getElementById('q-text').innerText = q.q;
            const box = document.getElementById('options'); box.innerHTML = '';
            q.options.forEach(o => {
                const b = document.createElement('button'); b.className = 'opt-btn'; b.innerText = o;
                b.onclick = () => check(o, b, q.a); box.appendChild(b);
            });
            startTimer();
        }

        function startTimer() {
            timeLeft = 10; document.getElementById('t-bar').style.width = "100%";
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--; document.getElementById('t-bar').style.width = (timeLeft * 10) + "%";
                if(timeLeft <= 0) { clearInterval(timer); qIdx++; loadQ(); }
            }, 1000);
        }

        function check(choice, btn, correct) {
            clearInterval(timer);
            const btns = document.querySelectorAll('.opt-btn'); btns.forEach(b => b.disabled = true);
            if(choice === correct) {
                btn.classList.add('correct'); score += 1;
                confetti({ particleCount: 30, origin: { y: 0.8 } });
            } else {
                btn.classList.add('wrong'); score -= 0.25;
                btns.forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
            }
            setTimeout(() => { qIdx++; loadQ(); }, 1200);
            document.getElementById('score-val').innerText = "⭐ " + score.toFixed(2);
        }

        function endQuiz() {
            const name = localStorage.getItem('quiz_user_name');
            const finalScore = Number(score.toFixed(2));
            push(ref(db, 'leaderboard'), { name, score: finalScore, date: Date.now() });
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('f-score').innerText = finalScore.toFixed(2);
            confetti({ particleCount: 150, spread: 70 });
        }

        window.switchTab = (tab) => {
            document.getElementById('home-screen').style.display = tab === 'test' ? 'block' : 'none';
            document.getElementById('leaderboard-screen').style.display = tab === 'rank' ? 'block' : 'none';
            document.getElementById('my-rank-box').style.display = tab === 'rank' ? 'flex' : 'none';
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('tab-test').classList.toggle('active', tab === 'test');
            document.getElementById('tab-rank').classList.toggle('active', tab === 'rank');
            if(tab === 'rank') loadLB();
        };

        function loadLB() {
            const myName = localStorage.getItem('quiz_user_name');
            onValue(ref(db, 'leaderboard'), (snap) => {
                let list = [];
                if(snap.exists()) {
                    snap.forEach(c => { let v = c.val(); v.score = Number(v.score); list.push(v); });
                }
                list.sort((a,b) => b.score - a.score);
                const body = document.getElementById('lb-body');
                body.innerHTML = '<h3 style="text-align:center">Top Rankers 🏆</h3>';
                list.slice(0, 15).forEach((u, i) => {
                    let medal = (i === 0) ? "🥇" : (i === 1) ? "🥈" : (i === 2) ? "🥉" : `<b>${i+1}.</b>`;
                    body.innerHTML += `<div class="rank-card ${i<3?'rank-'+(i+1):''}"><div class="user-info"><span>${medal}</span> <span style="margin-left:10px;">${u.name}</span></div><span>⭐ ${u.score.toFixed(2)}</span></div>`;
                });
                if(myName) {
                    const myRankIdx = list.findIndex(u => u.name === myName) + 1;
                    const myBest = list.find(u => u.name === myName);
                    if(myRankIdx > 0) {
                        document.getElementById('my-rank-num').innerText = myRankIdx;
                        document.getElementById('my-rank-name').innerText = myName;
                        document.getElementById('my-rank-score').innerText = "⭐ " + (myBest ? myBest.score.toFixed(2) : "0.00");
                    }
                }
            });
        }

        window.shareScore = () => {
            const finalScore = document.getElementById('f-score').innerText;
            const text = `🚀 *Gyan Quiz Challenge!* \nमेरा स्कोर: *${finalScore}* \nक्या आप मुझे हरा सकते हैं?`;
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`);
        };

        // PWA Service Worker
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
